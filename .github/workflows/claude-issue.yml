name: Claude Auto-Work on Issue

on:
  issues:
    types: [labeled]

jobs:
  claude-work:
    if: github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Run Claude on issue
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          system_prompt: "모든 응답은 반드시 한국어로 작성하세요. 코드 주석, PR 설명, 이슈 댓글 등 모든 텍스트를 한국어로 작성하세요."
