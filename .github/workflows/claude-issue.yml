name: Claude Auto-Work on Issue

on:
  issues:
    types: [labeled]

jobs:
  claude-work:
    if: github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create branch for issue
        id: create-branch
        run: |
          BRANCH="claude/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run Claude on issue
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          branch: ${{ steps.create-branch.outputs.branch }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          system_prompt: "모든 응답은 반드시 한국어로 작성하세요."

      - name: Create PR and copy labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ steps.create-branch.outputs.branch }}"

          EXISTING=$(gh pr list --repo "$REPO" --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "PR #$EXISTING already exists"
            exit 0
          fi

          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json title --jq '.title')
          LABELS=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels \
            --jq '[.labels[].name] | join(",")')

          LABEL_FLAG=""
          if [ -n "$LABELS" ]; then
            LABEL_FLAG="--label $LABELS"
          fi

          gh pr create \
            --repo "$REPO" \
            --head "$BRANCH" \
            --base main \
            --title "$ISSUE_TITLE" \
            --body "Closes #${ISSUE_NUMBER}" \
            $LABEL_FLAG
