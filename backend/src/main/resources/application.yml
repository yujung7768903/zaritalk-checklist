spring:
  datasource:
    url: jdbc:h2:mem:checklist;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:placeholder}

server:
  port: 8080
