spring:
  datasource:
    url: jdbc:h2:mem:checklist;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5174}

jwt:
  secret: ${JWT_SECRET}

molit:
  api-key: ${MOLIT_API_KEY:}

building:
  api-key: ${BUILDING_API_KEY:}

server:
  port: 8080
